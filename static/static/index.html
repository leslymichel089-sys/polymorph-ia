<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLYMORPHIA</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#e0e0f0; font-family:Arial,sans-serif; height:100vh; display:flex; flex-direction:column; }
#login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:20px; }
#login-screen h1 { color:#c9a0ff; font-size:28px; }
#login-screen p { color:#6050a0; font-size:13px; }
#login-screen input { background:#111128; color:#e0e0f0; border:1px solid #3a1a7a; border-radius:6px; padding:12px; font-size:16px; text-align:center; letter-spacing:4px; width:220px; }
#login-screen button { background:#7030d0; color:white; border:none; border-radius:6px; padding:12px 30px; font-size:15px; font-weight:bold; cursor:pointer; }
#login-screen button:hover { background:#5020b0; }
#error { color:#ff4060; font-size:13px; display:none; }
#app { display:none; flex-direction:column; height:100vh; }
header { background:#7030d0; padding:16px; text-align:center; }
header h1 { color:white; font-size:22px; }
header p { color:#e0d0ff; font-size:11px; }
#chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.msg-user { background:#1a0a4a; color:#e0e0f0; padding:10px 14px; border-radius:10px; align-self:flex-end; max-width:80%; }
.msg-ai { background:#0d1a3a; color:#e0e0f0; padding:10px 14px; border-radius:10px; align-self:flex-start; max-width:80%; }
.msg-label { font-size:11px; font-weight:bold; margin-bottom:4px; }
.label-user { color:#c9a0ff; }
.label-ai { color:#70d0ff; }
.thinking { color:#6050a0; font-style:italic; font-size:12px; }
footer { background:#0a0a1a; padding:10px; display:flex; gap:8px; border-top:1px solid #1a1040; }
#input { flex:1; background:#111128; color:#e0e0f0; border:1px solid #3a1a7a; border-radius:6px; padding:10px; font-size:14px; }
#btn { background:#7030d0; color:white; border:none; border-radius:6px; padding:10px 20px; font-size:14px; font-weight:bold; cursor:pointer; }
#btn:disabled { background:#3a1a6a; }
</style>
</head>
<body>

<div id="login-screen">
  <h1>🌟 POLYMORPHIA</h1>
  <p>Creee par Lesly Michel — Lesly Tech LLC</p>
  <input type="password" id="code-input" placeholder="Code d acces" maxlength="10">
  <div id="error">Code incorrect. Acces refuse.</div>
  <button onclick="checkCode()">Entrer</button>
</div>

<div id="app">
  <header>
    <h1>🌟 POLYMORPHIA</h1>
    <p>Creee par Lesly Michel — Lesly Tech LLC</p>
  </header>
  <div id="chat"></div>
  <footer>
    <input id="input" type="text" placeholder="Tapez votre message...">
    <button id="btn" onclick="send()">Envoyer</button>
  </footer>
</div>

<script>
const ACCESS_CODE = "150875";

function checkCode() {
  const code = document.getElementById('code-input').value;
  if (code === ACCESS_CODE) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    addMsg('Bonjour ! Je suis POLYMORPHIA, une Intelligence Artificielle creee par PDG Lesly Michel, de Lesly Tech LLC. Comment puis-je vous aider ?', 'ai');
  } else {
    document.getElementById('error').style.display = 'block';
    document.getElementById('code-input').value = '';
  }
}

document.getElementById('code-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') checkCode();
});

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const btn = document.getElementById('btn');

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'msg-' + type;
  const label = document.createElement('div');
  label.className = 'msg-label label-' + type;
  label.textContent = type === 'user' ? 'Vous' : 'POLYMORPHIA';
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(label);
  div.appendChild(content);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.textContent = 'POLYMORPHIA reflechit...';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  btn.disabled = true;
  addMsg(text, 'user');
  addThinking();
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    const data = await res.json();
    document.getElementById('thinking')?.remove();
    addMsg(data.response, 'ai');
  } catch(e) {
    document.getElementById('thinking')?.remove();
    addMsg('Erreur de connexion.', 'ai');
  }
  btn.disabled = false;
}

input.addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
</script>
</body>
</html>
